function getResultKey(score) {
  var avg = score / questions.length;
  if (avg <= 1.3) return 'anemone';
  if (avg <= 1.7) return 'mandala';
  if (avg <= 2.0) return 'poppy';
  if (avg <= 2.3) return 'oleander';
  if (avg <= 2.6) return 'aconite';
  if (avg <= 2.9) return 'lily';
  if (avg <= 3.2) return 'colchicum';
  if (avg <= 3.5) return 'wolfsbane';
  if (avg <= 3.7) return 'alocasia';
  if (avg <= 3.85) return 'poinsettia';
  if (avg <= 3.95) return 'azalea';
  return 'milkweed';
}

function startQuiz() {
  currentQuestion = 0;
  answers = [];
  scores = [];
  totalScore = 0;
  document.getElementById('startPage').classList.remove('active');
  document.getElementById('quizPage').classList.add('active');
  showQuestion();
}

function showQuestion() {
  var q = questions[currentQuestion];
  var progress = ((currentQuestion + 1) / questions.length) * 100;

  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressText').textContent = '第 ' + (currentQuestion + 1) + ' 题 / 共 ' + questions.length + ' 题';

  var html = '';
  html += '<div class="question-num">问题 ' + (currentQuestion + 1) + '</div>';
  html += '<div class="question-text">' + q.text + '</div>';
  html += '<div class="option-list">';

  q.options.forEach(function(opt, i) {
    var letter = String.fromCharCode(65 + i);
    html += '<div class="option" onclick="selectOption(' + i + ', ' + opt.score + ')">';
    html += '<div class="option-letter">' + letter + '</div>';
    html += '<div class="option-text">' + opt.text + '</div>';
    html += '</div>';
  });

  html += '</div>';

  if (currentQuestion > 0) {
    html += '<button class="prev-btn" onclick="goToPrevQuestion()">← 返回上一题</button>';
  }

  document.getElementById('questionContent').innerHTML = html;
}

function selectOption(index, score) {
  var options = document.querySelectorAll('.option');
  options.forEach(function(el) { el.classList.remove('selected'); });
  options[index].classList.add('selected');

  if (scores[currentQuestion] !== undefined) {
    totalScore -= scores[currentQuestion];
  }

  answers[currentQuestion] = index;
  scores[currentQuestion] = score;
  totalScore += score;

  setTimeout(function() {
    currentQuestion++;
    if (currentQuestion < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 300);
}

function goToPrevQuestion() {
  if (scores[currentQuestion] !== undefined) {
    totalScore -= scores[currentQuestion];
    scores[currentQuestion] = undefined;
    answers[currentQuestion] = undefined;
  }
  currentQuestion--;
  if (currentQuestion < 0) currentQuestion = 0;
  showQuestion();
}

function showResult() {
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('resultPage').classList.add('active');

  var key = getResultKey(totalScore);
  var r = Q[key];
  window._resultData = r;

  var html = '';

  // 妖花身份卡
  html += '<div class="identity-card">';
  html += '<div class="identity-label">✦ 你的本命妖花 ✦</div>';
  html += '<div class="identity-emoji">' + r.emoji + '</div>';
  html += '<div class="identity-name">' + r.type + '</div>';
  html += '<div class="identity-tagline">「 ' + r.tagline + ' 」</div>';
  html += '<div class="identity-score">';
  html += '<span class="identity-score-label">契合度</span>';
  html += '<span class="identity-score-num">' + Math.round((totalScore / (questions.length * 4)) * 100) + '%</span>';
  html += '</div>';
  html += '</div>';

  // 关键词标签
  html += '<div class="tags-section">';
  html += '<div class="tags-title">— 你的关键词 —</div>';
  html += '<div class="tags-list">';
  r.tags.forEach(function(tag) {
    html += '<span class="tag-item">#' + tag + '</span>';
  });
  html += '</div></div>';

  // 金句卡片
  html += '<div class="quote-card">';
  html += '<div class="quote-mark">"</div>';
  html += '<div class="quote-text">' + r.quote + '</div>';
  html += '</div>';

  // 关于你
  html += '<div class="result-card">';
  html += '<div class="result-card-title">🌸 花物语</div>';
  html += '<div class="result-card-content">';
  r.about.forEach(function(p) {
    html += '<p>' + p + '</p>';
  });
  html += '</div></div>';

  // 感情观
  html += '<div class="result-card">';
  html += '<div class="result-card-title">💕 你的感情观</div>';
  html += '<div class="result-card-content">';
  html += '<p>' + r.love + '</p>';
  html += '</div></div>';

  // 致命软肋
  html += '<div class="result-card">';
  html += '<div class="result-card-title">⚡ 致命软肋</div>';
  html += '<div class="result-card-content">';
  html += '<p>' + r.weakness + '</p>';
  html += '</div></div>';

  // 给你的话
  html += '<div class="result-card">';
  html += '<div class="result-card-title">✨ 写给你的话</div>';
  html += '<div class="result-card-content">';
  html += '<p>' + r.advice + '</p>';
  html += '</div></div>';

  // 数据条
  html += '<div class="result-card">';
  html += '<div class="result-card-title">📊 妖花属性</div>';
  html += '<div class="result-card-content">';
  r.data.forEach(function(d) {
    html += '<div class="data-bar">';
    html += '<div class="data-bar-label"><span>' + d.label + '</span><strong>' + d.value + '%</strong></div>';
    html += '<div class="data-bar-track"><div class="data-bar-fill" style="width:' + d.value + '%"></div></div>';
    html += '</div>';
  });
  html += '</div></div>';

  // 按钮
  html += '<div class="bottom-btns">';
  html += '<button class="bottom-btn secondary" onclick="restart()">🔄 再测一次</button>';
  html += '<button class="bottom-btn primary" onclick="shareResult()">📤 分享结果</button>';
  html += '</div>';

  // 底部标识
  html += '<div class="result-footer">— 来自 <span>12朵致命妖花</span> 测试 —</div>';

  document.getElementById('resultContent').innerHTML = html;
  window.scrollTo(0, 0);
}

function restart() {
  currentQuestion = 0;
  totalScore = 0;
  answers = [];
  scores = [];
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('startPage').classList.add('active');
  window.scrollTo(0, 0);
}

function isWechat() {
  return /MicroMessenger/i.test(navigator.userAgent);
}

function shareResult() {
  var r = window._resultData || Q[getResultKey(totalScore)];
  var shareText = '我在「12朵致命妖花测试」中测出了【' + r.type + '】！\n\n' +
    r.tagline + '\n\n' +
    '你也来测测吧~\n' + window.location.href;

  window._shareText = shareText;

  var overlay = document.getElementById('shareOverlay');
  var normalPanel = document.getElementById('shareNormalPanel');
  var wechatPanel = document.getElementById('shareWechatPanel');
  var preview = document.getElementById('sharePreview');

  preview.innerHTML = '我在「12朵致命妖花测试」中测出了<strong>【' + r.type + '】</strong>！<br>' + r.tagline + '<br>你也来测测吧~';

  if (isWechat()) {
    normalPanel.style.display = 'none';
    wechatPanel.style.display = 'block';
  } else {
    normalPanel.style.display = 'block';
    wechatPanel.style.display = 'none';
  }

  overlay.classList.add('active');
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('active');
}

function shareToWechat() {
  var text = window._shareText;
  if (isWechat()) {
    showToast('请点击右上角「...」选择发送给朋友');
    return;
  }
  if (navigator.share) {
    navigator.share({
      title: '12朵致命妖花测试',
      text: text,
      url: window.location.href
    }).catch(function(){});
  } else {
    copyToClipboard(text);
    showToast('已复制结果！打开微信粘贴给好友即可~');
    setTimeout(function(){ window.location.href = 'weixin://'; }, 800);
  }
}

function shareToXHS() {
  var text = window._shareText;
  if (isWechat()) {
    copyToClipboard(text);
    showToast('已复制！点击右上角「...」选择在浏览器打开，再去小红书粘贴');
    return;
  }
  copyToClipboard(text);
  showToast('已复制结果！打开小红书私信粘贴即可~');

}

function shareToMoments() {
  var text = window._shareText;
  if (isWechat()) {
    showToast('请点击右上角「...」选择分享到朋友圈');
    return;
  }
  if (navigator.share) {
    navigator.share({
      title: '12朵致命妖花测试',
      text: text,
      url: window.location.href
    }).catch(function(){});
  } else {
    copyToClipboard(text);
    showToast('已复制结果！打开朋友圈粘贴即可~');
    setTimeout(function(){ window.location.href = 'weixin://'; }, 800);
  }
}

function copyResult() {
  var text = window._shareText;
  copyToClipboard(text);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){
      showToast('已复制到剪贴板！');
    }).catch(function(){ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.top = '0';
  textarea.style.zIndex = '99999';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('已复制到剪贴板！');
  } catch(e) {
    showToast('复制失败，请长按文字手动复制');
  }
  document.body.removeChild(textarea);
}

function showToast(msg) {
  var toast = document.getElementById('copyToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function(){ toast.classList.remove('show'); }, 2000);
}
</script>
